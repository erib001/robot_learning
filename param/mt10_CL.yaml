algo: SAC # SAC | SAC_PCGRAD
env_settings: # passed to gym.make_vec
  max_episode_steps: 200
  seed: 42
  tasks:
  - reach-v3
  - push-v3
  - pick-place-v3
  - door-open-v3
  - drawer-open-v3
  - drawer-close-v3
  - button-press-topdown-v3
  - peg-insert-side-v3
  - window-open-v3
  - window-close-v3
id: 20014 # str | int, name for this configuration
ns: mt10
misc: # parameters used in a few places
  CHECKPOINT_FREQ: 1000000
  EVAL_FREQ: 10000
  N_EVAL_EPISODES: 10
  TIMESTEPS: 2000000    #2 million per steps
  max_elements: 10 # Anzahl der Elemente welche für den Mittelwert berücksichtigt werden.
  dynamicP: True # Soll Wahrscheinlichkeit angepasst werden
  updateP_eval_calls: 1 # Wie oft wird evaluiert bevor die Wahrscheinlichkeit angepasst wird
sac_settings: # passed to SAC constructor
  policy: MlpPolicy
  learning_rate: 0.0003    #5e-4
  buffer_size: 300000
  learning_starts: 5000
  batch_size: 256
  tau: 0.001
  gamma: 0.99
  gradient_steps: 1
  ent_coef: "auto"
  target_entropy: 'auto'
  use_sde: False
  policy_kwargs:
    net_arch:
      - 512
      - 1024
      - 1024
      - 512
    log_std_init: -3
    # activation_fn isn't supported right now, defaults to ReLU, can implement something if we need to change it
